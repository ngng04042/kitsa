<html><head>
    <link rel="manifest" href="/manifest.json" />
<script src="/fullscreen.js" defer></script>
    <script src="js/sw.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta charset="utf-8">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="viewport" content="width=device-width">

    <title>mObywatel 2.0</title>

    <link rel="shortcut icon" href="images/coi_common_ui_ic_mobywatel_logo.svg" type="image/x-icon">
    <meta name="theme-color" content="#fff">
    <meta name="next-head-count" content="5">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="http://51.68.148.12/auth/user/mobywatel/manifest.json">


    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="css/all.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 100;
            src: url(fonts/roboto_light.ttf) format("truetype");
        }

        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 300;
            src: url(fonts/roboto_light.ttf) format("truetype");
        }

        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 400;
            src: url(fonts/roboto_regular.ttf) format("truetype");
        }

        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 500;
            src: url(fonts/roboto_medium.ttf) format("truetype");
        }

        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 700;
            src: url(fonts/roboto_bold.ttf) format("truetype");
        }

        @font-face {
            font-family: Roboto;
            font-style: normal;
            font-weight: 900;
            src: url(fonts/roboto_bold.ttf) format("truetype");
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Roboto, sans-serif;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .Login_container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2em;
        }

        .Login_logoContainer {
            margin-top: 3em;
            margin-bottom: 2em;
        }

        .Login_title {
            font-size: 1.5em;
            font-weight: 500;
            margin-bottom: 0.5em;
            color: #000;
        }

        .Login_subtitle {
            font-size: 1em;
            color: #757575;
            margin-bottom: 2em;
            text-align: center;
        }

        .Login_inputContainer {
            width: 100%;
            max-width: 300px;
            margin-bottom: 1.5em;
        }

        .Login_label {
            display: block;
            font-size: 0.9em;
            color: #757575;
            margin-bottom: 0.5em;
        }

        .Login_inputWrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .Login_input {
            width: 100%;
            padding: 0.8em;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .Login_input:focus {
            border-color: #0052a5;
        }

        .Login_forgotPassword {
            color: #0052a5;
            font-size: 0.9em;
            text-decoration: none;
            margin-top: 0.5em;
            display: block;
            text-align: right;
        }

        .Login_button {
            width: 100%;
            max-width: 300px;
            padding: 1em;
            background-color: #0052a5;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .Login_button:hover {
            background-color: #003d7a;
        }

        .Login_footer {
            padding: 1em;
            text-align: center;
            background-color: #f5f5f5;
        }

        .Login_footerLogos {
            display: flex;
            justify-content: center;
            gap: 1em;
            margin-bottom: 0.5em;
        }

        .Login_versionText {
            font-size: 0.8em;
            color: #9e9e9e;
        }
    </style>
</head>
<body>
    <div class="Login_container">
        <div class="Login_logoContainer">
            <img src="images/coi_common_ui_ic_mobywatel_logo.svg" alt="mObywatel Logo" style="width: 10em; height: auto;">
        </div>
        <h1 class="Login_title">Logowanie</h1>
        <p class="Login_subtitle">Zaloguj się do aplikacji mObywatel</p>

        <div class="Login_inputContainer">
            <label class="Login_label" for="passwordInput">Hasło</label>
            <div class="Login_inputWrapper">
                <input class="Login_input" type="password" id="passwordInput" placeholder="Wprowadź hasło">
            </div>
            <a href="#" class="Login_forgotPassword">Nie pamiętasz hasła?</a>
        </div>

        <button class="Login_button" id="submitButton">Zaloguj się</button>

        <footer class="Login_footer" style="margin-top: auto; width: 100%; background: none;">
            <div class="Login_footerLogos">
                <img src="images/coi_common_ui_ic_mobywatel_logo.svg" alt="Footer Image 1" style="width: 5em; height: auto;">
                <img src="images/coi_common_ui_ic_mc_mobywatel_logo.svg" alt="Footer Image 2" style="width: 4em; height: auto;">
            </div>
            <p class="Login_versionText">wersja 4.41.2 (8)</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Hasło z Twojego oryginalnego pliku
            const correctPassword = '12345'; 

            const submitButton = document.getElementById('submitButton');
            if (submitButton) {
                submitButton.addEventListener('click', function(event) {
                    event.preventDefault();

                    const userPassword = document.getElementById('passwordInput').value;

                    if (!userPassword) {
                        alert('Proszę wprowadzić hasło');
                    } else if (userPassword === correctPassword) {
                        // Przekierowanie na stronę domową
                        window.location.href = 'home.html'; 
                    } else {
                        alert('Nieprawidłowe hasło');
                    }
                });
            }
        });
    </script>
</body></html>
